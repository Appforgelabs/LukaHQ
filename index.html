<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luka HQ — Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #070b16;
    color: #e2e8f0;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* HUD BAR */
  #hud {
    height: 44px;
    background: #0a0e1a;
    border-bottom: 1px solid #1e3a5f;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 10;
  }
  #hud .title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #f59e0b;
    text-shadow: 0 0 12px #f59e0b88;
  }
  #hud .clock {
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: 1px;
  }
  #hud .sys-status {
    font-size: 11px;
    color: #10b981;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #hud .sys-status::before {
    content: '';
    width: 7px; height: 7px;
    background: #10b981;
    border-radius: 50%;
    display: inline-block;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; box-shadow: 0 0 4px #10b981; }
    50% { opacity: 0.5; box-shadow: 0 0 10px #10b981; }
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* CANVAS AREA */
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #070b16;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: pointer;
  }

  /* GRID LINES background effect */
  #canvas-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(30,58,95,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,58,95,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* RIGHT PANEL */
  #panel {
    width: 300px;
    background: #0a0e1a;
    border-left: 1px solid #1e3a5f;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #panel-header {
    padding: 16px;
    border-bottom: 1px solid #1e3a5f;
    background: #0f1629;
  }
  #panel-header h2 {
    font-size: 11px;
    letter-spacing: 2px;
    color: #64748b;
    text-transform: uppercase;
  }
  #panel-header h3 {
    font-size: 14px;
    color: #e2e8f0;
    margin-top: 4px;
    font-weight: 700;
  }
  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-track { background: #0a0e1a; }
  #panel-body::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

  /* ROOM OVERVIEW CARDS */
  .room-card {
    background: #0f1629;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .room-card:hover { border-color: #3b82f6; background: #111d35; }
  .room-card.selected { border-color: #f59e0b; background: #1a1508; }
  .room-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .room-card-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-active { background: #10b981; box-shadow: 0 0 6px #10b981; }
  .status-idle { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
  .status-error { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .room-card-time {
    font-size: 9px;
    color: #475569;
  }
  .room-card-summary {
    font-size: 10px;
    color: #94a3b8;
    line-height: 1.5;
    margin-top: 6px;
  }

  /* DETAIL VIEW */
  #detail-view { display: none; }
  #detail-view .detail-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  #detail-view .detail-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  #detail-view .detail-status-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #detail-view .detail-lastrun {
    font-size: 10px;
    color: #64748b;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1e3a5f;
  }
  #detail-view .detail-summary {
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .ping-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    color: #94a3b8;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ping-btn:hover {
    border-color: #f59e0b;
    color: #f59e0b;
    background: #1a1508;
  }
  .back-btn {
    background: none;
    border: none;
    color: #475569;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0 0 12px 0;
    letter-spacing: 1px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-btn:hover { color: #94a3b8; }

  /* SPEECH BUBBLE */
  #speech-bubble {
    position: absolute;
    background: rgba(255,255,255,0.95);
    color: #0a0e1a;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 8px;
    max-width: 160px;
    line-height: 1.4;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 5;
    white-space: nowrap;
  }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
  }

  /* FOOTER */
  #footer {
    height: 28px;
    background: #0a0e1a;
    border-top: 1px solid #1e3a5f;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    flex-shrink: 0;
  }
  #footer span {
    font-size: 9px;
    color: #334155;
    letter-spacing: 1px;
  }
  #footer .live { color: #10b981; }
</style>
</head>
<body>

<div id="hud">
  <div class="title">⚙ LUKA HQ</div>
  <div class="clock" id="clock">--:-- -- ET</div>
  <div class="sys-status" id="sys-status">ALL SYSTEMS NOMINAL</div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="iso" width="860" height="520"></canvas>
    <div id="speech-bubble"></div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h2>Operations</h2>
      <h3 id="panel-title">LUKA HQ Overview</h3>
    </div>
    <div id="panel-body">
      <!-- Overview cards -->
      <div id="overview-view"></div>
      <!-- Detail view -->
      <div id="detail-view">
        <button class="back-btn" onclick="showOverview()">← back</button>
        <div class="detail-name" id="d-name"></div>
        <div class="detail-status-row">
          <div class="status-dot" id="d-dot"></div>
          <div class="detail-status-label" id="d-status"></div>
        </div>
        <div class="detail-lastrun" id="d-lastrun"></div>
        <div class="detail-summary" id="d-summary"></div>
        <button class="ping-btn" id="d-ping">📡 Ping Luka</button>
      </div>
    </div>
  </div>
</div>

<div id="footer">
  <span class="live">● LIVE</span>
  <span>LUKA HQ v1.0</span>
  <span id="last-updated">Updated: —</span>
  <span>appforgelabs.github.io/LukaHQ</span>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────────
const DEFAULT_STATUS = {
  updated: new Date().toISOString(),
  rooms: {
    market:     { status: 'active', lastRun: '4:06 PM ET', summary: 'EOD wrap complete. Portfolio -0.89%. SOFI -$97, RIVN short +$14, TSLA +$19.' },
    pulseforge: { status: 'active', lastRun: '6:00 PM ET', summary: 'Daily pipeline ran. SPY -0.40%. Data synced to GitHub Pages.' },
    social:     { status: 'idle',   lastRun: '9:14 AM ET', summary: 'X post sent: PLTR down 24% YTD — getting interesting.' },
    kidwatch:   { status: 'idle',   lastRun: '8:00 PM ET', summary: '90 videos scanned. All clear. No flagged content.' },
    engine:     { status: 'active', lastRun: 'ongoing',    summary: '16 cron jobs scheduled and running. Heartbeat every 30 min.' },
    comms:      { status: 'active', lastRun: '4:06 PM ET', summary: 'EOD brief sent to #stock-market. 2 position decisions pending.' }
  }
};

const ROOM_META = {
  market:     { label: 'MARKET COMMAND', color: [245, 158, 11],  desc: "Luka's trading desk. Live portfolio tracking, EOD wraps, alert generation." },
  pulseforge: { label: 'PULSEFORGE LAB', color: [6,   182, 212], desc: 'ML macro intelligence pipeline. Sector rotation, pulse scores, watchlist data.' },
  social:     { label: 'SOCIAL STUDIO',  color: [139, 92,  246], desc: 'Daily X posts @jigaraero. Dry, witty, no hashtags. 9 AM ET weekdays.' },
  kidwatch:   { label: 'KIDWATCH ROOM',  color: [16,  185, 129], desc: 'YouTube watch history safety scanner. Daily report to Discord #kidwatch.' },
  engine:     { label: 'ENGINE ROOM',    color: [249, 115, 22],  desc: '16 cron jobs, heartbeat scheduler, pipeline orchestration. The heart of HQ.' },
  comms:      { label: 'COMMS ROOM',     color: [59,  130, 246], desc: 'Discord briefings, market alerts, EOD summaries to #stock-market.' }
};

const SPEECH_LINES = [
  "Watching the tape...",
  "SOFI still dragging. Classic.",
  "RIVN buffer: $0.33. Sweating.",
  "NIO... just... why.",
  "Crons nominal. Mostly.",
  "All green in Engine Room.",
  "EOD wrap sent. Good day.",
  "VIX ~26. Stay sharp.",
  "Jack, you around?"
];

let statusData = DEFAULT_STATUS;
let selectedRoom = null;
let hoveredRoom = null;

// ─── ISO LAYOUT ────────────────────────────────────────────────────────────────
// Isometric tile: 160px wide, 80px tall
// 6 rooms: 3 per floor, 2 floors
// Canvas origin: top-left. We'll position the building centered.

const TW = 160; // tile width
const TH = 80;  // tile height (half of TW for 2:1 ratio)
const TZ = 90;  // wall height in pixels

// Isometric math: grid (col, row, floor) → screen (x, y)
function isoToScreen(col, row, floor, ox, oy) {
  const sx = ox + (col - row) * (TW / 2);
  const sy = oy + (col + row) * (TH / 2) - floor * TZ;
  return { x: sx, y: sy };
}

// Room grid positions [col, row] — 3 wide × 2 deep
const ROOM_GRID = {
  //          col  row  floor
  market:     [0,  0,   1],
  pulseforge: [1,  0,   1],
  social:     [2,  0,   1],
  kidwatch:   [0,  1,   0],
  engine:     [1,  1,   0],
  comms:      [2,  1,   0]
};

// Canvas and rendering
const canvas = document.getElementById('iso');
const ctx = canvas.getContext('2d');
const ORIGIN_X = canvas.width / 2;
const ORIGIN_Y = 300;

// Animation state
let frame = 0;
let lukaY = 0; // bob offset

// ─── DRAW HELPERS ──────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function rgba([r,g,b], a) {
  return `rgba(${r},${g},${b},${a})`;
}

function lighten([r,g,b], f) {
  return `rgb(${Math.min(255,r+f)},${Math.min(255,g+f)},${Math.min(255,b+f)})`;
}
function darken([r,g,b], f) {
  return `rgb(${Math.max(0,r-f)},${Math.max(0,g-f)},${Math.max(0,b-f)})`;
}

// Draw one isometric box (top + left wall + right wall)
function drawIsoBox(col, row, floor, color, highlight, selected) {
  const top    = isoToScreen(col,   row,   floor+1, ORIGIN_X, ORIGIN_Y);
  const topR   = isoToScreen(col+1, row,   floor+1, ORIGIN_X, ORIGIN_Y);
  const topB   = isoToScreen(col+1, row+1, floor+1, ORIGIN_X, ORIGIN_Y);
  const topL   = isoToScreen(col,   row+1, floor+1, ORIGIN_X, ORIGIN_Y);
  const botL   = isoToScreen(col,   row+1, floor,   ORIGIN_X, ORIGIN_Y);
  const botB   = isoToScreen(col+1, row+1, floor,   ORIGIN_X, ORIGIN_Y);
  const botR   = isoToScreen(col+1, row,   floor,   ORIGIN_X, ORIGIN_Y);

  const glowAlpha = highlight ? 0.35 : selected ? 0.2 : 0;

  // Right face (darkest)
  ctx.beginPath();
  ctx.moveTo(topR.x, topR.y);
  ctx.lineTo(topB.x, topB.y);
  ctx.lineTo(botB.x, botB.y);
  ctx.lineTo(botR.x, botR.y);
  ctx.closePath();
  ctx.fillStyle = darken(color, 60);
  ctx.fill();
  if (glowAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${glowAlpha * 0.5})`;
    ctx.fill();
  }
  ctx.strokeStyle = highlight || selected ? `rgb(${color[0]},${color[1]},${color[2]})` : 'rgba(255,255,255,0.08)';
  ctx.lineWidth = highlight || selected ? 1.5 : 0.5;
  ctx.stroke();

  // Left face (medium)
  ctx.beginPath();
  ctx.moveTo(top.x, top.y);
  ctx.lineTo(topL.x, topL.y);
  ctx.lineTo(botL.x, botL.y);
  ctx.lineTo(botR.x, botR.y); // fix: connect bottom correctly
  // left face: top -> topL -> botL -> botR? No:
  // left wall: top-left edge
  ctx.closePath();
  // Redo left face properly
  ctx.beginPath();
  ctx.moveTo(top.x, top.y);
  ctx.lineTo(topL.x, topL.y);
  ctx.lineTo(botL.x, botL.y);
  ctx.lineTo(isoToScreen(col, row, floor, ORIGIN_X, ORIGIN_Y).x, isoToScreen(col, row, floor, ORIGIN_X, ORIGIN_Y).y);
  ctx.closePath();
  ctx.fillStyle = darken(color, 30);
  ctx.fill();
  if (glowAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${glowAlpha * 0.3})`;
    ctx.fill();
  }
  ctx.strokeStyle = highlight || selected ? `rgb(${color[0]},${color[1]},${color[2]})` : 'rgba(255,255,255,0.08)';
  ctx.lineWidth = highlight || selected ? 1.5 : 0.5;
  ctx.stroke();

  // Top face (lightest)
  ctx.beginPath();
  ctx.moveTo(top.x, top.y);
  ctx.lineTo(topR.x, topR.y);
  ctx.lineTo(topB.x, topB.y);
  ctx.lineTo(topL.x, topL.y);
  ctx.closePath();
  ctx.fillStyle = lighten(color, 20);
  ctx.fill();
  if (glowAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${glowAlpha})`;
    ctx.fill();
  }
  ctx.strokeStyle = highlight || selected ? `rgb(${color[0]},${color[1]},${color[2]})` : 'rgba(255,255,255,0.12)';
  ctx.lineWidth = highlight || selected ? 2 : 0.5;
  ctx.stroke();

  // Selected glow border
  if (selected) {
    ctx.beginPath();
    ctx.moveTo(top.x, top.y);
    ctx.lineTo(topR.x, topR.y);
    ctx.lineTo(topB.x, topB.y);
    ctx.lineTo(topL.x, topL.y);
    ctx.closePath();
    ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},0.8)`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  return { top, topR, topB, topL }; // return top face corners for furniture placement
}

// Draw a status dot on the top face
function drawStatusDot(cx, cy, status) {
  const colors = { active: '#10b981', idle: '#f59e0b', error: '#ef4444' };
  const c = colors[status] || '#64748b';
  const pulse = status === 'active' ? 0.5 + 0.5 * Math.sin(frame * 0.05) : 1;
  ctx.beginPath();
  ctx.arc(cx, cy, 5 * pulse, 0, Math.PI * 2);
  ctx.fillStyle = c;
  ctx.fill();
  if (status === 'active') {
    ctx.beginPath();
    ctx.arc(cx, cy, 8 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = c + '44';
    ctx.fill();
  }
}

// Draw room label above box
function drawLabel(text, x, y, color, selected) {
  ctx.font = `700 9px 'Space Mono', monospace`;
  ctx.textAlign = 'center';
  const alpha = selected ? 1 : 0.7;
  ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`;
  ctx.fillText(text, x, y - 8);
}

// Draw Luka character (fox-ish amber blob)
function drawLuka(topFace, bobOffset) {
  const cx = (topFace.top.x + topFace.topR.x + topFace.topB.x + topFace.topL.x) / 4;
  const cy = (topFace.top.y + topFace.topR.y + topFace.topB.y + topFace.topL.y) / 4 - 20 + bobOffset;

  // Body
  ctx.beginPath();
  ctx.ellipse(cx, cy + 8, 9, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f59e0b';
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#fbbf24';
  ctx.fill();

  // Ears
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy - 10);
  ctx.lineTo(cx - 10, cy - 18);
  ctx.lineTo(cx - 2, cy - 13);
  ctx.fillStyle = '#f59e0b';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + 6, cy - 10);
  ctx.lineTo(cx + 10, cy - 18);
  ctx.lineTo(cx + 2, cy - 13);
  ctx.fill();

  // Eyes (2 dots)
  ctx.fillStyle = '#0a0e1a';
  ctx.beginPath(); ctx.arc(cx - 3, cy - 5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, cy - 5, 1.5, 0, Math.PI*2); ctx.fill();

  // Gear badge
  ctx.font = '9px serif';
  ctx.fillText('⚙', cx + 7, cy - 12);

  // Return head position for speech bubble
  return { x: cx, y: cy - 22 };
}

// Draw PulseBot (cyan bouncing dot)
function drawPulseBot(topFace) {
  const cx = (topFace.top.x + topFace.topR.x + topFace.topB.x + topFace.topL.x) / 4 + 10;
  const cy = (topFace.top.y + topFace.topR.y + topFace.topB.y + topFace.topL.y) / 4 - 18 + Math.sin(frame * 0.08) * 5;
  const r = 10;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#06b6d4';
  ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r + 4 + Math.sin(frame * 0.05) * 3, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(6,182,212,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.font = '8px serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#0a0e1a'; ctx.fillText('PB', cx, cy + 3);
}

// Draw KidWatcher (green rounded square)
function drawKidWatcher(topFace) {
  const cx = (topFace.top.x + topFace.topR.x + topFace.topB.x + topFace.topL.x) / 4;
  const cy = (topFace.top.y + topFace.topR.y + topFace.topB.y + topFace.topL.y) / 4 - 18;
  const walk = Math.sin(frame * 0.03) * 8;
  const x = cx + walk;
  ctx.beginPath();
  ctx.roundRect(x - 9, cy - 9, 18, 18, 4);
  ctx.fillStyle = '#10b981';
  ctx.fill();
  ctx.font = '8px serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#0a0e1a'; ctx.fillText('KW', x, cy + 3);
}

// Draw Cronos (orange rotating gear)
function drawCronos(topFace) {
  const cx = (topFace.top.x + topFace.topR.x + topFace.topB.x + topFace.topL.x) / 4;
  const cy = (topFace.top.y + topFace.topR.y + topFace.topB.y + topFace.topL.y) / 4 - 18;
  const angle = frame * 0.02;
  const teeth = 8, r = 10, innerR = 7, toothH = 4;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // Gear teeth
  ctx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a1 = (i / teeth) * Math.PI * 2 - Math.PI / teeth;
    const a2 = a1 + Math.PI / teeth;
    const a3 = a2 + Math.PI / teeth * 0.2;
    const a4 = (i + 1) / teeth * Math.PI * 2 - Math.PI / teeth * 0.2;
    if (i === 0) ctx.moveTo(Math.cos(a1) * r, Math.sin(a1) * r);
    ctx.lineTo(Math.cos(a1) * (r + toothH), Math.sin(a1) * (r + toothH));
    ctx.lineTo(Math.cos(a2) * (r + toothH), Math.sin(a2) * (r + toothH));
    ctx.lineTo(Math.cos(a3) * r, Math.sin(a3) * r);
    ctx.lineTo(Math.cos(a4) * r, Math.sin(a4) * r);
  }
  ctx.closePath();
  ctx.fillStyle = '#f97316';
  ctx.fill();

  ctx.beginPath(); ctx.arc(0, 0, innerR, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0e1a'; ctx.fill();
  ctx.strokeStyle = '#f97316'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.restore();
}

// ─── HIT DETECTION ────────────────────────────────────────────────────────────
// Check if point (px,py) is inside the top rhombus of a room
function pointInTopFace(px, py, col, row, floor) {
  const top  = isoToScreen(col,   row,   floor+1, ORIGIN_X, ORIGIN_Y);
  const topR = isoToScreen(col+1, row,   floor+1, ORIGIN_X, ORIGIN_Y);
  const topB = isoToScreen(col+1, row+1, floor+1, ORIGIN_X, ORIGIN_Y);
  const topL = isoToScreen(col,   row+1, floor+1, ORIGIN_X, ORIGIN_Y);

  // Check whole box top down (include walls) - use bounding box approach
  const minY = Math.min(top.y, isoToScreen(col, row, floor, ORIGIN_X, ORIGIN_Y).y);
  const maxY = Math.max(topB.y, isoToScreen(col+1, row+1, floor, ORIGIN_X, ORIGIN_Y).y);
  const minX = Math.min(top.x, topL.x, isoToScreen(col, row, floor, ORIGIN_X, ORIGIN_Y).x);
  const maxX = Math.max(topR.x, topB.x, isoToScreen(col+1, row+1, floor, ORIGIN_X, ORIGIN_Y).x);

  return px >= minX && px <= maxX && py >= minY && py <= maxY;
}

function getRoomAtPoint(px, py) {
  // Check floor 1 first (front), then floor 2 (back) — front rooms take priority
  const order = ['kidwatch', 'engine', 'comms', 'market', 'pulseforge', 'social'];
  for (const id of order) {
    const [col, row, floor] = ROOM_GRID[id];
    if (pointInTopFace(px, py, col, row, floor)) return id;
  }
  return null;
}

// ─── MAIN DRAW ────────────────────────────────────────────────────────────────
let lukaHeadPos = { x: 0, y: 0 };

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;

  const bobOffset = Math.sin(frame * 0.04) * 2.5;

  // Draw order: back rooms first (floor 1 back rows, then floor 2, then floor 1 front)
  // Painter's algorithm: sort by col+row ascending (furthest first)
  const drawOrder = [
    ['social',     false],
    ['pulseforge', false],
    ['market',     false],
    ['comms',      false],
    ['engine',     false],
    ['kidwatch',   false],
  ];

  const topFaces = {};

  for (const [id] of drawOrder) {
    const [col, row, floor] = ROOM_GRID[id];
    const color = ROOM_META[id].color;
    const isHovered = hoveredRoom === id;
    const isSelected = selectedRoom === id;
    const tf = drawIsoBox(col, row, floor, color, isHovered, isSelected);
    topFaces[id] = tf;

    // Status dot on top face
    const cx = (tf.top.x + tf.topR.x + tf.topB.x + tf.topL.x) / 4;
    const cy = (tf.top.y + tf.topR.y + tf.topB.y + tf.topL.y) / 4;
    const roomStatus = statusData.rooms[id]?.status || 'idle';
    drawStatusDot(cx, cy + 5, roomStatus);

    // Room label
    drawLabel(ROOM_META[id].label, cx, tf.top.y, color, isSelected);
  }

  // Draw characters (on top of boxes)
  lukaHeadPos = drawLuka(topFaces['market'], bobOffset);
  drawPulseBot(topFaces['pulseforge']);
  drawKidWatcher(topFaces['kidwatch']);
  drawCronos(topFaces['engine']);

  // Position speech bubble
  positionSpeechBubble(lukaHeadPos);
}

// ─── SPEECH BUBBLE ───────────────────────────────────────────────────────────
const bubble = document.getElementById('speech-bubble');
let bubbleIdx = 0;
let bubbleVisible = false;

function positionSpeechBubble(pos) {
  if (!bubbleVisible) return;
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  // Canvas might be scaled, get actual rendered size
  const scaleX = canvasRect.width / canvas.width;
  const scaleY = canvasRect.height / canvas.height;
  const bx = canvasRect.left - wrapRect.left + pos.x * scaleX - bubble.offsetWidth / 2;
  const by = canvasRect.top - wrapRect.top + pos.y * scaleY - bubble.offsetHeight - 6;
  bubble.style.left = bx + 'px';
  bubble.style.top = by + 'px';
}

function nextBubble() {
  bubble.style.opacity = '0';
  setTimeout(() => {
    bubble.textContent = SPEECH_LINES[bubbleIdx % SPEECH_LINES.length];
    bubbleIdx++;
    bubbleVisible = true;
    bubble.style.opacity = '1';
    setTimeout(() => {
      bubble.style.opacity = '0';
      setTimeout(() => { bubbleVisible = false; }, 500);
    }, 4000);
  }, 500);
}

// Start speech bubble cycle
setTimeout(nextBubble, 2000);
setInterval(nextBubble, 9000);

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
function loop() {
  draw();
  requestAnimationFrame(loop);
}
loop();

// ─── MOUSE INTERACTION ───────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const room = getRoomAtPoint(px, py);
  hoveredRoom = room;
  canvas.style.cursor = room ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => { hoveredRoom = null; });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const room = getRoomAtPoint(px, py);
  if (room) {
    selectedRoom = room;
    showDetail(room);
  }
});

// ─── PANEL ───────────────────────────────────────────────────────────────────
function buildOverview() {
  const el = document.getElementById('overview-view');
  el.innerHTML = '';
  const order = ['market', 'pulseforge', 'social', 'kidwatch', 'engine', 'comms'];
  for (const id of order) {
    const meta = ROOM_META[id];
    const data = statusData.rooms[id] || { status: 'idle', lastRun: '—', summary: '—' };
    const card = document.createElement('div');
    card.className = 'room-card' + (selectedRoom === id ? ' selected' : '');
    card.onclick = () => { selectedRoom = id; showDetail(id); };
    card.innerHTML = `
      <div class="room-card-top">
        <span class="room-card-name" style="color:rgb(${meta.color.join(',')})">${meta.label}</span>
        <span class="status-dot status-${data.status}"></span>
      </div>
      <div class="room-card-time">Last: ${data.lastRun}</div>
    `;
    el.appendChild(card);
  }
}

function showDetail(id) {
  const meta = ROOM_META[id];
  const data = statusData.rooms[id] || { status: 'idle', lastRun: '—', summary: '—' };
  const statusLabel = { active: 'ACTIVE', idle: 'IDLE', error: 'ERROR' }[data.status] || data.status.toUpperCase();
  const statusColor = { active: '#10b981', idle: '#f59e0b', error: '#ef4444' }[data.status] || '#64748b';

  document.getElementById('panel-title').textContent = meta.label;
  document.getElementById('d-name').textContent = meta.label;
  document.getElementById('d-name').style.color = `rgb(${meta.color.join(',')})`;
  document.getElementById('d-dot').className = `status-dot status-${data.status}`;
  document.getElementById('d-status').textContent = statusLabel;
  document.getElementById('d-status').style.color = statusColor;
  document.getElementById('d-lastrun').textContent = `Last run: ${data.lastRun}`;
  document.getElementById('d-summary').textContent = data.summary;
  document.getElementById('d-ping').onclick = () => {
    alert(`📡 Pinging Luka in ${meta.label}...\n\n(Interaction coming soon — Luka will respond via Discord)`);
  };

  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
}

function showOverview() {
  selectedRoom = null;
  document.getElementById('panel-title').textContent = 'LUKA HQ Overview';
  document.getElementById('overview-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  buildOverview();
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const et = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: true
  }).format(now);
  document.getElementById('clock').textContent = et + ' ET';
}
setInterval(updateClock, 1000);
updateClock();

// ─── STATUS DATA ──────────────────────────────────────────────────────────────
function loadStatus() {
  fetch('./status.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      statusData = data;
      const updated = new Date(data.updated);
      document.getElementById('last-updated').textContent =
        'Updated: ' + updated.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit' }) + ' ET';

      // Update sys-status
      const allActive = Object.values(data.rooms).every(r => r.status !== 'error');
      const hasError = Object.values(data.rooms).some(r => r.status === 'error');
      const sysEl = document.getElementById('sys-status');
      if (hasError) {
        sysEl.style.color = '#ef4444';
        sysEl.textContent = 'SYSTEM ALERT';
      } else {
        sysEl.style.color = '#10b981';
        sysEl.textContent = 'ALL SYSTEMS NOMINAL';
      }

      buildOverview();
    })
    .catch(() => {
      buildOverview(); // use defaults
    });
}

loadStatus();
setInterval(loadStatus, 60000); // refresh every minute

// Initial panel build
buildOverview();
</script>

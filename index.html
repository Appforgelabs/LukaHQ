<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luka HQ — Pixel Ops Center</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ══════════ RESET & BASE ══════════ */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a14;
  color:#e2e8f0;
  font-family:'Press Start 2P',monospace;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  image-rendering:pixelated;
}

/* ══════════ CRT SCANLINE OVERLAY ══════════ */
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  animation:scanline 8s linear infinite;
}
@keyframes scanline{
  0%{background-position:0 0}
  100%{background-position:0 400px}
}

/* ══════════ MAIN AREA ══════════ */
#scene{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ══════════ ISO GRID CONTAINER ══════════ */
#iso-grid{
  position:relative;
  width:900px;
  height:600px;
}

/* ══════════ ROOM BASE ══════════ */
.room{
  position:absolute;
  width:260px;
  height:200px;
  cursor:pointer;
  transition:filter 0.2s;
}
.room:hover{filter:brightness(1.3)}
.room:hover .room-tooltip{opacity:1;transform:translateY(-4px)}

/* Room positions — cross/plus layout */
.room--trading   {left:80px;  top:20px}
.room--machine   {left:520px; top:20px}
.room--command   {left:300px; top:190px}
.room--comms     {left:80px;  top:360px}
.room--kidwatch  {left:520px; top:360px}

/* ══════════ ISO FLOOR ══════════ */
.room-floor{
  position:absolute;
  bottom:0;
  left:50%;
  width:180px;
  height:180px;
  transform:translateX(-50%) rotateX(60deg) rotateZ(45deg);
  border:3px solid rgba(255,255,255,0.08);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
.room--trading  .room-floor{background:#1a2e1a;border-color:#2d5a2d44}
.room--machine  .room-floor{background:#2e2415;border-color:#5a3d1544}
.room--command  .room-floor{background:#2e1515;border-color:#5a151544}
.room--comms    .room-floor{background:#151a2e;border-color:#15305a44}
.room--kidwatch .room-floor{background:#231530;border-color:#3d155a44}

/* Floor tile grid lines */
.room-floor::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(90deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 36px),
    repeating-linear-gradient(0deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 1px,transparent 1px,transparent 36px);
}

/* ══════════ ROOM LABEL ══════════ */
.room-label{
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  white-space:nowrap;
}
.room-name{
  font-size:7px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.room--trading  .room-name{color:#4ade80}
.room--machine  .room-name{color:#fb923c}
.room--command  .room-name{color:#f87171}
.room--comms    .room-name{color:#60a5fa}
.room--kidwatch .room-name{color:#c084fc}

/* ══════════ STATUS BADGE ══════════ */
.room-badge{
  display:inline-block;
  font-size:5px;
  padding:2px 6px;
  border-radius:2px;
  letter-spacing:1px;
  text-transform:uppercase;
}
.room-badge::before{content:'● '}
.badge-active{background:#16a34a33;color:#4ade80;animation:pulse-badge 2s infinite}
.badge-idle{background:#a3a3a322;color:#a3a3a3}
.badge-error{background:#dc262633;color:#f87171;animation:pulse-badge 1s infinite}
@keyframes pulse-badge{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}

/* ══════════ ROOM SUMMARY ══════════ */
.room-summary{
  position:absolute;
  bottom:46px;
  left:50%;
  transform:translateX(-50%);
  font-size:5px;
  color:#94a3b8;
  text-align:center;
  width:220px;
  line-height:1.6;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* ══════════ TOOLTIP ══════════ */
.room-tooltip{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%) translateY(0);
  background:#1a1a2e;
  border:2px solid;
  padding:6px 10px;
  font-size:5px;
  line-height:1.8;
  color:#cbd5e1;
  width:240px;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:all 0.2s;
  z-index:100;
  white-space:normal;
}
.room--trading  .room-tooltip{border-color:#4ade8044}
.room--machine  .room-tooltip{border-color:#fb923c44}
.room--command  .room-tooltip{border-color:#f8717144}
.room--comms    .room-tooltip{border-color:#60a5fa44}
.room--kidwatch .room-tooltip{border-color:#c084fc44}

/* ══════════ PIXEL FURNITURE ══════════ */
.furniture{position:absolute;bottom:30px;left:50%;transform:translateX(-50%)}
.pixel-desk{
  width:32px;height:16px;
  background:#5c4a32;
  border:2px solid #3d3222;
  position:absolute;
  image-rendering:pixelated;
}
.pixel-monitor{
  width:14px;height:10px;
  border:2px solid #555;
  position:absolute;
  image-rendering:pixelated;
}
.pixel-monitor::after{
  content:'';position:absolute;
  bottom:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;background:#444;
}

/* Trading: 2 desks + 3 monitors (green screens) */
.room--trading .furn-desk1{left:-30px;bottom:0}
.room--trading .furn-desk2{left:10px;bottom:0}
.room--trading .furn-mon1{left:-24px;bottom:18px;background:#0a2e0a;border-color:#2d5a2d}
.room--trading .furn-mon2{left:-6px;bottom:18px;background:#0a2e0a;border-color:#2d5a2d}
.room--trading .furn-mon3{left:16px;bottom:18px;background:#0a2e0a;border-color:#2d5a2d}

/* Machine Shop: workbench + printer */
.room--machine .furn-bench{left:-20px;bottom:0;width:44px;background:#4a3a22;border-color:#3d2e18}
.room--machine .furn-printer{left:30px;bottom:0;width:18px;height:20px;background:#3a3a3a;border:2px solid #555}
.room--machine .furn-printer::before{content:'';position:absolute;top:2px;left:2px;width:10px;height:4px;background:#fb923c55}

/* Command: big desk + 2 large monitors */
.room--command .furn-desk1{left:-22px;bottom:0;width:48px;background:#4a2222;border-color:#3d1818}
.room--command .furn-mon1{left:-16px;bottom:18px;width:18px;height:12px;background:#1a0a0a;border-color:#5a2d2d}
.room--command .furn-mon2{left:8px;bottom:18px;width:18px;height:12px;background:#1a0a0a;border-color:#5a2d2d}

/* Comms: desk + antenna */
.room--comms .furn-desk1{left:-16px;bottom:0}
.room--comms .furn-mon1{left:-10px;bottom:18px;background:#0a0a2e;border-color:#2d2d5a}
.room--comms .furn-antenna{position:absolute;left:28px;bottom:0;width:4px;height:30px;background:#60a5fa55}
.room--comms .furn-antenna::before{content:'';position:absolute;top:0;left:-3px;width:10px;height:4px;background:#60a5fa88;border-radius:50%}

/* KidWatch: desk + screen */
.room--kidwatch .furn-desk1{left:-16px;bottom:0;background:#3a2244;border-color:#2e1838}
.room--kidwatch .furn-mon1{left:-10px;bottom:18px;width:16px;height:12px;background:#1a0a2e;border-color:#5a2d8a}
.room--kidwatch .furn-shield{position:absolute;left:22px;bottom:4px;width:12px;height:14px;background:#c084fc33;border:2px solid #c084fc55;border-radius:0 0 6px 6px;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}

/* ══════════ FOX CHARACTER — 16x16 CSS PIXEL ART ══════════ */
#fox{
  position:absolute;
  z-index:50;
  transition:left 1.5s ease-in-out, top 1.5s ease-in-out;
}
#fox-sprite{
  width:48px;height:48px;
  position:relative;
  animation:fox-bob 0.4s ease-in-out infinite alternate;
}
@keyframes fox-bob{
  0%{transform:translateY(0)}
  100%{transform:translateY(-3px)}
}

/* 16x16 pixel grid — each cell is 3px */
.fox-grid{
  display:grid;
  grid-template-columns:repeat(16,3px);
  grid-template-rows:repeat(16,3px);
  image-rendering:pixelated;
}
.fp{width:3px;height:3px}
/* Fox colors */
.f-o{background:#e87b35} /* orange fur */
.f-d{background:#c45e1a} /* dark orange */
.f-w{background:#f5f0e0} /* white belly */
.f-e{background:#1a1a2e} /* dark (ears, eyes) */
.f-n{background:#2a1a0a} /* nose */
.f-g{background:#f5c842} /* goggle yellow */
.f-t{background:#d4722a} /* tail mid */
.f-l{background:#f5deb3} /* tail tip light */
.f-x{background:transparent}

/* ══════════ BOTTOM HUD BAR ══════════ */
#hud{
  height:52px;
  background:#0d0d1a;
  border-top:3px solid #1a1a3a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  flex-shrink:0;
  z-index:100;
  gap:8px;
}

/* HUD Left */
#hud-left{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:8px;
  color:#f59e0b;
  text-shadow:0 0 8px #f59e0b66;
  white-space:nowrap;
}
.blink-cursor{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* HUD Center — bars */
#hud-center{
  display:flex;
  align-items:center;
  gap:16px;
  flex:1;
  justify-content:center;
}
.hud-bar{
  display:flex;
  align-items:center;
  gap:6px;
}
.hud-bar-label{
  font-size:5px;
  color:#94a3b8;
  letter-spacing:1px;
  min-width:20px;
}
.hud-bar-track{
  width:80px;
  height:10px;
  background:#1a1a2e;
  border:2px solid #2a2a4a;
  position:relative;
  overflow:hidden;
}
.hud-bar-fill{
  height:100%;
  width:0%;
  transition:width 1.5s ease-out;
}
.hud-bar-value{
  font-size:5px;
  color:#e2e8f0;
  min-width:50px;
}

/* Market status */
#market-status{
  font-size:6px;
  padding:3px 8px;
  border-radius:2px;
  letter-spacing:1px;
}
.market-open{background:#16a34a33;color:#4ade80;border:1px solid #16a34a55}
.market-closed{background:#dc262622;color:#f87171;border:1px solid #dc262644}

/* HUD Right — links */
#hud-right{
  display:flex;
  align-items:center;
  gap:8px;
}
.hud-link{
  font-size:6px;
  text-decoration:none;
  padding:3px 6px;
  border:1px solid #2a2a4a;
  border-radius:2px;
  transition:all 0.2s;
  white-space:nowrap;
}
.hud-link:hover{background:#2a2a4a;border-color:#4a4a6a}
.hud-link-lf{color:#4ade80}
.hud-link-pf{color:#fb923c}
.hud-link-kw{color:#c084fc}
.hud-link-st{color:#fbbf24}

/* Timestamp & stale */
#hud-time{
  font-size:5px;
  color:#64748b;
  text-align:right;
  line-height:1.6;
  min-width:80px;
}
.stale-warn{color:#f59e0b !important;animation:pulse-badge 2s infinite}

/* ══════════ CONNECTING LINES (hallways) ══════════ */
.hallway{
  position:absolute;
  background:repeating-linear-gradient(
    90deg,
    #1a1a2e 0px,
    #1a1a2e 4px,
    transparent 4px,
    transparent 8px
  );
  opacity:0.3;
}
.hall-tc{width:4px;height:60px;left:320px;top:130px;transform:rotate(25deg)}
.hall-tm{width:4px;height:60px;left:540px;top:130px;transform:rotate(-25deg)}
.hall-cb{width:4px;height:60px;left:320px;top:350px;transform:rotate(-25deg)}
.hall-kb{width:4px;height:60px;left:540px;top:350px;transform:rotate(25deg)}
</style>
</head>
<body>

<!-- ══════════ MAIN SCENE ══════════ -->
<div id="scene">
  <div id="iso-grid">
    <!-- Hallway connectors -->
    <div class="hallway hall-tc"></div>
    <div class="hallway hall-tm"></div>
    <div class="hallway hall-cb"></div>
    <div class="hallway hall-kb"></div>

    <!-- TRADING FLOOR -->
    <div class="room room--trading" data-room="market">
      <div class="room-tooltip" id="tip-market"></div>
      <div class="room-label">
        <div class="room-name">Trading Floor</div>
        <span class="room-badge badge-active" id="badge-market">ACTIVE</span>
      </div>
      <div class="room-floor"></div>
      <div class="furniture">
        <div class="pixel-desk furn-desk1"></div>
        <div class="pixel-desk furn-desk2"></div>
        <div class="pixel-monitor furn-mon1"></div>
        <div class="pixel-monitor furn-mon2"></div>
        <div class="pixel-monitor furn-mon3"></div>
      </div>
      <div class="room-summary" id="sum-market">—</div>
    </div>

    <!-- MACHINE SHOP -->
    <div class="room room--machine" data-room="pulseforge">
      <div class="room-tooltip" id="tip-pulseforge"></div>
      <div class="room-label">
        <div class="room-name">Machine Shop</div>
        <span class="room-badge badge-active" id="badge-pulseforge">ACTIVE</span>
      </div>
      <div class="room-floor"></div>
      <div class="furniture">
        <div class="pixel-desk furn-bench"></div>
        <div class="furn-printer"></div>
      </div>
      <div class="room-summary" id="sum-pulseforge">—</div>
    </div>

    <!-- COMMAND CENTER -->
    <div class="room room--command" data-room="engine">
      <div class="room-tooltip" id="tip-engine"></div>
      <div class="room-label">
        <div class="room-name">Command Center</div>
        <span class="room-badge badge-active" id="badge-engine">ACTIVE</span>
      </div>
      <div class="room-floor"></div>
      <div class="furniture">
        <div class="pixel-desk furn-desk1"></div>
        <div class="pixel-monitor furn-mon1"></div>
        <div class="pixel-monitor furn-mon2"></div>
      </div>
      <div class="room-summary" id="sum-engine">—</div>
    </div>

    <!-- COMMS ROOM -->
    <div class="room room--comms" data-room="comms">
      <div class="room-tooltip" id="tip-comms"></div>
      <div class="room-label">
        <div class="room-name">Comms Room</div>
        <span class="room-badge badge-active" id="badge-comms">ACTIVE</span>
      </div>
      <div class="room-floor"></div>
      <div class="furniture">
        <div class="pixel-desk furn-desk1"></div>
        <div class="pixel-monitor furn-mon1"></div>
        <div class="furn-antenna"></div>
      </div>
      <div class="room-summary" id="sum-comms">—</div>
    </div>

    <!-- KIDWATCH ROOM -->
    <div class="room room--kidwatch" data-room="kidwatch">
      <div class="room-tooltip" id="tip-kidwatch"></div>
      <div class="room-label">
        <div class="room-name">KidWatch Room</div>
        <span class="room-badge badge-idle" id="badge-kidwatch">IDLE</span>
      </div>
      <div class="room-floor"></div>
      <div class="furniture">
        <div class="pixel-desk furn-desk1"></div>
        <div class="pixel-monitor furn-mon1"></div>
        <div class="furn-shield"></div>
      </div>
      <div class="room-summary" id="sum-kidwatch">—</div>
    </div>

    <!-- FOX CHARACTER -->
    <div id="fox">
      <div id="fox-sprite">
        <div class="fox-grid" id="fox-pixels"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ BOTTOM HUD ══════════ -->
<div id="hud">
  <div id="hud-left">
    LUKA HQ <span class="blink-cursor">▮</span>
  </div>

  <div id="hud-center">
    <!-- HP Bar (P&L) -->
    <div class="hud-bar">
      <span class="hud-bar-label">HP</span>
      <div class="hud-bar-track">
        <div class="hud-bar-fill" id="hp-fill" style="background:#4ade80"></div>
      </div>
      <span class="hud-bar-value" id="hp-value">P&L: --</span>
    </div>

    <!-- MP Bar (VIX) -->
    <div class="hud-bar">
      <span class="hud-bar-label">MP</span>
      <div class="hud-bar-track">
        <div class="hud-bar-fill" id="mp-fill" style="background:#fbbf24"></div>
      </div>
      <span class="hud-bar-value" id="mp-value">VIX: 25.54</span>
    </div>

    <!-- Market Open/Closed -->
    <div id="market-status">—</div>
  </div>

  <div id="hud-right">
    <a class="hud-link hud-link-lf" href="https://appforgelabs.github.io/LukaFund/" target="_blank">📊 LukaFund</a>
    <a class="hud-link hud-link-pf" href="https://appforgelabs.github.io/PulseForge/" target="_blank">📡 PulseForge</a>
    <a class="hud-link hud-link-kw" href="https://appforgelabs.github.io/KidWatch/" target="_blank">🎬 KidWatch</a>
    <a class="hud-link hud-link-st" href="https://appforgelabs.github.io/ShouldIBeTrading/" target="_blank">⚡ SIBT</a>
    <div id="hud-time">--</div>
  </div>
</div>

<script>
// ══════════ FOX PIXEL ART (16x16) ══════════
// x=transparent, o=orange, d=dark orange, w=white, e=dark, n=nose, g=goggle, t=tail, l=tail tip
const FOX_MAP = [
  'xxxxxxxxxxxxxxxx',
  'xxxexxxxxxxxxxxx',
  'xxeeoxxxxxxxxxxx',
  'xeooooxxxxxxxxxx',
  'xeooooggoxxxxxxx',
  'xxoooggoooxxxxxx',
  'xxooenooooxxxxxx',
  'xxxowwoooxxxxxxx',
  'xxxowwooooxxxxxx',
  'xxxxoooooodxxxxx',
  'xxxxooooodddxxxx',
  'xxxxwwwwxdttxxxx',
  'xxxxooooxxttlxxx',
  'xxxooxxooxtllxxx',
  'xxxoxxxxoxxlxxxx',
  'xxxxxxxxxxxxxxxx',
];
const COLOR_MAP = {
  x:'f-x', o:'f-o', d:'f-d', w:'f-w', e:'f-e',
  n:'f-n', g:'f-g', t:'f-t', l:'f-l'
};
const foxEl = document.getElementById('fox-pixels');
FOX_MAP.forEach(row => {
  [...row].forEach(c => {
    const px = document.createElement('div');
    px.className = 'fp ' + (COLOR_MAP[c] || 'f-x');
    foxEl.appendChild(px);
  });
});

// ══════════ FOX POSITIONING ══════════
const ROOM_CENTERS = {
  market:    {left:190, top:100},
  pulseforge:{left:630, top:100},
  engine:    {left:410, top:270},
  comms:     {left:190, top:440},
  kidwatch:  {left:630, top:440},
};

const fox = document.getElementById('fox');
// Start in command center
fox.style.left = ROOM_CENTERS.engine.left + 'px';
fox.style.top  = ROOM_CENTERS.engine.top + 'px';

// Walk to random room on load, then back
setTimeout(() => {
  const rooms = Object.keys(ROOM_CENTERS).filter(r => r !== 'engine');
  const dest = rooms[Math.floor(Math.random() * rooms.length)];
  fox.style.left = ROOM_CENTERS[dest].left + 'px';
  fox.style.top  = ROOM_CENTERS[dest].top + 'px';
  setTimeout(() => {
    fox.style.left = ROOM_CENTERS.engine.left + 'px';
    fox.style.top  = ROOM_CENTERS.engine.top + 'px';
  }, 3000);
}, 1500);

// ══════════ MARKET OPEN/CLOSED CHECK ══════════
function isMarketOpen() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', {timeZone:'America/New_York'}));
  const day = et.getDay();
  if (day === 0 || day === 6) return false;
  const mins = et.getHours() * 60 + et.getMinutes();
  return mins >= 570 && mins < 960; // 9:30 - 16:00
}

const mktEl = document.getElementById('market-status');
if (isMarketOpen()) {
  mktEl.textContent = 'MARKET OPEN';
  mktEl.className = 'market-open';
} else {
  mktEl.textContent = 'MARKET CLOSED';
  mktEl.className = 'market-closed';
}

// ══════════ VIX BAR — populated from status.json in applyStatus ══════════

// ══════════ STATUS.JSON FETCH ══════════
const FALLBACK = {
  updated: '--',
  rooms: {
    market:    {status:'idle',summary:'No data'},
    pulseforge:{status:'idle',summary:'No data'},
    engine:    {status:'idle',summary:'No data'},
    comms:     {status:'idle',summary:'No data'},
    kidwatch:  {status:'idle',summary:'No data'},
  }
};

const ROOM_KEY_MAP = {
  market:'market', pulseforge:'pulseforge',
  engine:'engine', comms:'comms', kidwatch:'kidwatch',
  social:'comms'
};

function applyStatus(data) {
  const rooms = data.rooms || {};
  // Map room keys to display IDs
  const displayMap = {
    market:'market', pulseforge:'pulseforge',
    engine:'engine', comms:'comms', kidwatch:'kidwatch'
  };
  // Handle social→comms alias
  if (rooms.social && !rooms.comms) rooms.comms = rooms.social;

  Object.entries(displayMap).forEach(([key, id]) => {
    const r = rooms[key];
    if (!r) return;
    // Badge
    const badge = document.getElementById('badge-' + id);
    if (badge) {
      const s = (r.status || 'idle').toLowerCase();
      badge.className = 'room-badge badge-' + s;
      badge.textContent = s.toUpperCase();
    }
    // Summary
    const sum = document.getElementById('sum-' + id);
    if (sum) sum.textContent = r.summary || '—';
    // Tooltip
    const tip = document.getElementById('tip-' + id);
    if (tip) tip.textContent = r.summary || '—';
  });

  // Portfolio P&L from status.json
  if (data.portfolio) {
    const pct = parseFloat(data.portfolio.total_return_pct);
    const hpEl = document.getElementById('hp-fill');
    const hpVal = document.getElementById('hp-value');
    if (!isNaN(pct)) {
      const barPct = Math.min(Math.abs(pct) / 10 * 100, 100); // scale: 10% = full bar
      hpEl.style.background = pct >= 0 ? '#4ade80' : '#f87171';
      hpVal.textContent = 'P&L: ' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      setTimeout(() => { hpEl.style.width = barPct + '%'; }, 300);
    }
  }

  // VIX from status.json
  if (data.vix !== undefined) {
    const vixVal = parseFloat(data.vix);
    const mpEl = document.getElementById('mp-fill');
    const mpVal = document.getElementById('mp-value');
    mpVal.textContent = 'VIX: ' + vixVal.toFixed(2);
    mpEl.style.background = vixVal < 20 ? '#4ade80' : vixVal < 25 ? '#fbbf24' : '#f87171';
    setTimeout(() => { mpEl.style.width = Math.min((vixVal / 80) * 100, 100) + '%'; }, 300);
  }

  // Timestamp + stale check
  const timeEl = document.getElementById('hud-time');
  if (data.updated && data.updated !== '--') {
    const d = new Date(data.updated);
    const ago = Date.now() - d.getTime();
    const hrs = Math.floor(ago / 3600000);
    const mins = Math.floor((ago % 3600000) / 60000);
    let label = hrs > 0 ? hrs + 'h ' + mins + 'm ago' : mins + 'm ago';
    timeEl.textContent = label;
    if (ago > 3600000) {
      timeEl.classList.add('stale-warn');
      timeEl.textContent += ' ⚠ STALE';
    }
  } else {
    timeEl.textContent = 'NO DATA';
  }
}

fetch('status.json?v=' + Date.now())
  .then(r => r.json())
  .then(applyStatus)
  .catch(() => applyStatus(FALLBACK));

// ══════════ PORTFOLIO P&L — from status.json portfolio block ══════════
// (wired in applyStatus below — no separate fetch needed)
</script>

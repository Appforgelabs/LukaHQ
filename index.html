<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luka HQ — Operations Center</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e2e8f0;
    font-family: 'Noto Sans JP', 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* HUD BAR */
  #hud {
    height: 44px;
    background: rgba(5,8,16,0.95);
    border-bottom: 1px solid #1e3a5f;
    border-top: 2px solid #dc2626;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  #hud .title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #f59e0b;
    text-shadow: 0 0 12px #f59e0b88;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #hud .clock {
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: 1px;
    font-family: 'Space Mono', monospace;
  }
  #hud .sys-status {
    font-size: 11px;
    color: #10b981;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
  }
  #hud .sys-status::before {
    content: '';
    width: 7px; height: 7px;
    background: #10b981;
    border-radius: 50%;
    display: inline-block;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; box-shadow: 0 0 4px #10b981; }
    50% { opacity: 0.5; box-shadow: 0 0 10px #10b981; }
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* THREE.JS CANVAS AREA */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #050810;
  }
  #canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* RIGHT PANEL */
  #panel {
    width: 300px;
    background: rgba(5,8,16,0.92);
    backdrop-filter: blur(10px);
    border-left: 1px solid #1e3a5f;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    z-index: 5;
  }
  #panel-header {
    padding: 16px;
    border-bottom: 1px solid #1e3a5f;
    background: rgba(15,22,41,0.9);
  }
  #panel-header h2 {
    font-size: 11px;
    letter-spacing: 2px;
    color: #64748b;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  #panel-header h3 {
    font-size: 14px;
    color: #e2e8f0;
    margin-top: 4px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #panel-body::-webkit-scrollbar { width: 4px; }
  #panel-body::-webkit-scrollbar-track { background: transparent; }
  #panel-body::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

  /* ROOM OVERVIEW CARDS */
  .room-card {
    background: rgba(15,22,41,0.8);
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .room-card:hover { border-color: #dc2626; background: rgba(30,15,15,0.6); }
  .room-card.selected { border-color: #f59e0b; background: rgba(26,21,8,0.6); }
  .room-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .room-card-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-active { background: #10b981; box-shadow: 0 0 6px #10b981; }
  .status-idle { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
  .status-error { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .room-card-time {
    font-size: 9px;
    color: #475569;
    font-family: 'Space Mono', monospace;
  }
  .room-card-summary {
    font-size: 10px;
    color: #94a3b8;
    line-height: 1.5;
    margin-top: 6px;
  }

  /* DETAIL VIEW */
  #detail-view { display: none; }
  #detail-view .detail-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  #detail-view .detail-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  #detail-view .detail-status-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  #detail-view .detail-lastrun {
    font-size: 10px;
    color: #64748b;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1e3a5f;
    font-family: 'Space Mono', monospace;
  }
  #detail-view .detail-summary {
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .ping-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    color: #94a3b8;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ping-btn:hover {
    border-color: #dc2626;
    color: #f59e0b;
    background: rgba(26,21,8,0.4);
  }
  .back-btn {
    background: none;
    border: none;
    color: #475569;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0 0 12px 0;
    letter-spacing: 1px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-btn:hover { color: #dc2626; }

  /* SPEECH BUBBLE */
  #speech-bubble {
    position: absolute;
    background: rgba(255,255,255,0.95);
    color: #0a0e1a;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 8px;
    max-width: 180px;
    line-height: 1.4;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 5;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  #speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
  }

  /* FOOTER */
  #footer {
    height: 28px;
    background: rgba(5,8,16,0.95);
    border-top: 1px solid #1e3a5f;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    flex-shrink: 0;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  #footer span {
    font-size: 9px;
    color: #334155;
    letter-spacing: 1px;
    font-family: 'Space Mono', monospace;
  }
  #footer .live { color: #10b981; }

  /* ROOM TOOLTIP on hover */
  #room-tooltip {
    position: absolute;
    background: rgba(5,8,16,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #dc2626;
    color: #e2e8f0;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 6;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="title">鳥居 LUKA HQ</div>
  <div class="clock" id="clock">--:-- -- ET</div>
  <div class="sys-status" id="sys-status">ALL SYSTEMS NOMINAL</div>
</div>

<div id="main">
  <div id="canvas-wrap">
    <div id="speech-bubble"></div>
    <div id="room-tooltip"></div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h2>Operations</h2>
      <h3 id="panel-title">LUKA HQ Overview</h3>
    </div>
    <div id="panel-body">
      <div id="overview-view"></div>
      <div id="detail-view">
        <button class="back-btn" onclick="showOverview()">← back</button>
        <div class="detail-name" id="d-name"></div>
        <div class="detail-status-row">
          <div class="status-dot" id="d-dot"></div>
          <div class="detail-status-label" id="d-status"></div>
        </div>
        <div class="detail-lastrun" id="d-lastrun"></div>
        <div class="detail-summary" id="d-summary"></div>
        <button class="ping-btn" id="d-ping">📡 Ping Luka</button>
      </div>
    </div>
  </div>
</div>

<div id="footer">
  <span class="live">● LIVE</span>
  <span>LUKA HQ v2.0 — 三次元</span>
  <span id="last-updated">Updated: —</span>
  <span>appforgelabs.github.io/LukaHQ</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── DATA ──────────────────────────────────────────────────────────────────────
const DEFAULT_STATUS = {
  updated: new Date().toISOString(),
  rooms: {
    market:     { status: 'active', lastRun: '4:06 PM ET', summary: 'EOD wrap complete. Portfolio -0.89%. SOFI -$97, RIVN short +$14, TSLA +$19.' },
    pulseforge: { status: 'active', lastRun: '6:00 PM ET', summary: 'Daily pipeline ran. SPY -0.40%. Data synced to GitHub Pages.' },
    social:     { status: 'idle',   lastRun: '9:14 AM ET', summary: 'X post sent: PLTR down 24% YTD — getting interesting.' },
    kidwatch:   { status: 'idle',   lastRun: '8:00 PM ET', summary: '90 videos scanned. All clear. No flagged content.' },
    engine:     { status: 'active', lastRun: 'ongoing',    summary: '16 cron jobs scheduled and running. Heartbeat every 30 min.' },
    comms:      { status: 'active', lastRun: '4:06 PM ET', summary: 'EOD brief sent to #stock-market. 2 position decisions pending.' }
  }
};

const ROOM_META = {
  market:     { label: 'MARKET COMMAND', color: [245, 158, 11],  hex: '#f59e0b', desc: "Luka's trading desk. Live portfolio tracking, EOD wraps, alert generation." },
  pulseforge: { label: 'PULSEFORGE LAB', color: [6, 182, 212],   hex: '#06b6d4', desc: 'ML macro intelligence pipeline. Sector rotation, pulse scores, watchlist data.' },
  social:     { label: 'SOCIAL STUDIO',  color: [139, 92, 246],  hex: '#8b5cf6', desc: 'Daily X posts @jigaraero. Dry, witty, no hashtags. 9 AM ET weekdays.' },
  kidwatch:   { label: 'KIDWATCH ROOM',  color: [16, 185, 129],  hex: '#10b981', desc: 'YouTube watch history safety scanner. Daily report to Discord #kidwatch.' },
  engine:     { label: 'ENGINE ROOM',    color: [249, 115, 22],  hex: '#f97316', desc: '16 cron jobs, heartbeat scheduler, pipeline orchestration. The heart of HQ.' },
  comms:      { label: 'COMMS ROOM',     color: [59, 130, 246],  hex: '#3b82f6', desc: 'Discord briefings, market alerts, EOD summaries to #stock-market.' }
};

const SPEECH_LINES = [
  "Watching the tape...",
  "SOFI still dragging. Classic.",
  "RIVN buffer: $0.33. Sweating.",
  "NIO... just... why.",
  "Crons nominal. Mostly.",
  "All green in Engine Room.",
  "EOD wrap sent. Good day.",
  "VIX ~26. Stay sharp.",
  "Jack, you around?"
];

let statusData = DEFAULT_STATUS;
let selectedRoom = null;

// ─── THREE.JS SETUP ────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.FogExp2(0x050810, 0.015);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(12, 10, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.minPolarAngle = Math.PI / 6;
controls.maxPolarAngle = Math.PI / 2.2;
controls.target.set(0, 0, 0);
controls.minDistance = 6;
controls.maxDistance = 25;

let autoRotateTimeout = null;
function pauseAutoRotate() {
  controls.autoRotate = false;
  clearTimeout(autoRotateTimeout);
  autoRotateTimeout = setTimeout(() => { controls.autoRotate = true; }, 5000);
}
controls.addEventListener('start', pauseAutoRotate);

// Resize handler
function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
onResize();

// ─── LIGHTS ────────────────────────────────────────────────────────────────────
// Moonlight - cool blue from above-left
const moonLight = new THREE.DirectionalLight(0x4466aa, 0.6);
moonLight.position.set(-8, 15, 5);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.near = 0.5;
moonLight.shadow.camera.far = 50;
moonLight.shadow.camera.left = -15;
moonLight.shadow.camera.right = 15;
moonLight.shadow.camera.top = 15;
moonLight.shadow.camera.bottom = -15;
scene.add(moonLight);

// Ambient fill
const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambientLight);

// Hemisphere for subtle sky/ground bounce
const hemiLight = new THREE.HemisphereLight(0x0a0a30, 0x0a0e1a, 0.2);
scene.add(hemiLight);

// ─── MATERIALS ─────────────────────────────────────────────────────────────────
const DARK_ROOF = 0x1a1a2e;
const GROUND_COLOR = 0x0d0d18;
const GRAVEL_COLOR = 0x1a1a28;

function wallMaterial(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.1,
    roughness: 0.8,
  });
}

function roofMaterial() {
  return new THREE.MeshStandardMaterial({
    color: DARK_ROOF,
    metalness: 0.3,
    roughness: 0.6,
  });
}

function windowMaterial(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.8,
    metalness: 0.0,
    roughness: 0.3,
    transparent: true,
    opacity: 0.9,
  });
}

function lanternMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0xffaa44,
    emissive: 0xffaa44,
    emissiveIntensity: 1.0,
    metalness: 0.0,
    roughness: 0.4,
  });
}

// ─── GROUND ────────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: GROUND_COLOR,
  metalness: 0.2,
  roughness: 0.9,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines on ground
const gridSize = 30;
const gridDivisions = 30;
const gridPoints = [];
for (let i = -gridSize / 2; i <= gridSize / 2; i += gridSize / gridDivisions) {
  gridPoints.push(new THREE.Vector3(i, 0.001, -gridSize / 2));
  gridPoints.push(new THREE.Vector3(i, 0.001, gridSize / 2));
  gridPoints.push(new THREE.Vector3(-gridSize / 2, 0.001, i));
  gridPoints.push(new THREE.Vector3(gridSize / 2, 0.001, i));
}
const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPoints);
const gridMat = new THREE.LineBasicMaterial({ color: 0x1e3a5f, transparent: true, opacity: 0.12 });
const gridLines = new THREE.LineSegments(gridGeo, gridMat);
scene.add(gridLines);

// Gravel paths - lighter tone rectangles
function createPath(x, z, w, d) {
  const geo = new THREE.PlaneGeometry(w, d);
  const mat = new THREE.MeshStandardMaterial({ color: GRAVEL_COLOR, roughness: 0.95, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, 0.005, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
}
// Main paths connecting buildings
createPath(0, 0, 2, 12);    // north-south center
createPath(0, 0, 12, 2);    // east-west center
createPath(-3.5, 3, 5, 1.5);  // path to front buildings
createPath(3.5, 3, 5, 1.5);

// ─── TORII GATE ────────────────────────────────────────────────────────────────
const toriiColor = 0xcc2222;
const toriiMat = new THREE.MeshStandardMaterial({ color: toriiColor, metalness: 0.2, roughness: 0.6 });

function createTorii(x, z, scale = 1) {
  const group = new THREE.Group();
  // Two vertical pillars
  const pillarGeo = new THREE.BoxGeometry(0.15 * scale, 2.2 * scale, 0.15 * scale);
  const leftPillar = new THREE.Mesh(pillarGeo, toriiMat);
  leftPillar.position.set(-0.6 * scale, 1.1 * scale, 0);
  leftPillar.castShadow = true;
  group.add(leftPillar);

  const rightPillar = new THREE.Mesh(pillarGeo, toriiMat);
  rightPillar.position.set(0.6 * scale, 1.1 * scale, 0);
  rightPillar.castShadow = true;
  group.add(rightPillar);

  // Top horizontal beam (kasagi) - slightly curved up at ends
  const topBeamGeo = new THREE.BoxGeometry(1.8 * scale, 0.12 * scale, 0.2 * scale);
  const topBeam = new THREE.Mesh(topBeamGeo, toriiMat);
  topBeam.position.set(0, 2.2 * scale, 0);
  topBeam.castShadow = true;
  group.add(topBeam);

  // Second beam (nuki)
  const nukiGeo = new THREE.BoxGeometry(1.4 * scale, 0.08 * scale, 0.12 * scale);
  const nuki = new THREE.Mesh(nukiGeo, toriiMat);
  nuki.position.set(0, 1.8 * scale, 0);
  group.add(nuki);

  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

// Main entrance torii
createTorii(0, 7, 1.2);
// Engine room mini torii
createTorii(0, 3.8, 0.6);

// ─── BUILDING CREATION ─────────────────────────────────────────────────────────
const buildings = {};
const buildingMeshes = []; // for raycasting
const windowMeshes = []; // for flickering
const lanternLights = []; // for pulsing

// Building positions in the compound
const BUILDING_POS = {
  market:     { x: 0,    z: -3.5, w: 3.5, h: 2.0, d: 2.5 },  // center-back, largest
  pulseforge: { x: -4.5, z: -1.5, w: 2.5, h: 1.8, d: 2.0 },  // left
  social:     { x: 4.5,  z: -1.5, w: 2.5, h: 1.8, d: 2.0 },  // right
  kidwatch:   { x: -4,   z: 3,    w: 2.0, h: 1.4, d: 1.8 },  // front-left small
  engine:     { x: 0,    z: 2.2,  w: 2.5, h: 1.6, d: 2.0 },  // front-center
  comms:      { x: 4,    z: 3,    w: 2.0, h: 1.6, d: 1.8 },  // front-right
};

const BUILDING_COLORS = {
  market:     0x2a1f0a,
  pulseforge: 0x0a1a2a,
  social:     0x1a0a2a,
  kidwatch:   0x0a2a1a,
  engine:     0x2a1a0a,
  comms:      0x0a1a2a,
};

const WINDOW_COLORS = {
  market:     0xf59e0b,
  pulseforge: 0x06b6d4,
  social:     0x8b5cf6,
  kidwatch:   0x10b981,
  engine:     0xf97316,
  comms:      0x3b82f6,
};

function createBuilding(id) {
  const pos = BUILDING_POS[id];
  const group = new THREE.Group();
  group.userData.roomId = id;

  // Main body
  const bodyGeo = new THREE.BoxGeometry(pos.w, pos.h, pos.d);
  const bodyMat = wallMaterial(BUILDING_COLORS[id]);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = pos.h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  body.userData.roomId = id;
  group.add(body);
  buildingMeshes.push(body);

  // Roof - overhanging, dark charcoal
  const roofOverhang = 0.4;
  const roofH = 0.15;
  const roofGeo = new THREE.BoxGeometry(pos.w + roofOverhang * 2, roofH, pos.d + roofOverhang * 2);
  const rMat = roofMaterial();
  const roof = new THREE.Mesh(roofGeo, rMat);
  roof.position.y = pos.h + roofH / 2;
  roof.castShadow = true;
  roof.userData.roomId = id;
  group.add(roof);
  buildingMeshes.push(roof);

  // Second roof tier (peaked) for visual interest
  const peakW = pos.w * 0.7;
  const peakH = 0.35;
  const peakGeo = new THREE.BoxGeometry(peakW, peakH, pos.d + 0.1);
  const peakMat = roofMaterial();
  const peak = new THREE.Mesh(peakGeo, peakMat);
  peak.position.y = pos.h + roofH + peakH / 2;
  peak.castShadow = true;
  peak.userData.roomId = id;
  group.add(peak);
  buildingMeshes.push(peak);

  // Teal edge highlights on roof
  const edgeGeo = new THREE.BoxGeometry(pos.w + roofOverhang * 2 + 0.05, 0.02, pos.d + roofOverhang * 2 + 0.05);
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x1a5a5a, emissive: 0x0a3a3a, emissiveIntensity: 0.3 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.y = pos.h + roofH + 0.01;
  group.add(edge);

  // Glowing windows on front face
  const winColor = WINDOW_COLORS[id];
  const winCount = Math.max(1, Math.floor(pos.w / 0.9));
  const winW = 0.35;
  const winH = 0.5;
  const winSpacing = pos.w / (winCount + 1);

  for (let i = 0; i < winCount; i++) {
    const winGeo = new THREE.PlaneGeometry(winW, winH);
    const winMat = windowMaterial(winColor);
    const win = new THREE.Mesh(winGeo, winMat);
    win.position.set(
      -pos.w / 2 + winSpacing * (i + 1),
      pos.h * 0.5,
      pos.d / 2 + 0.01
    );
    group.add(win);
    windowMeshes.push({ mesh: win, roomId: id, baseIntensity: 0.8 });
  }

  // Windows on back face
  for (let i = 0; i < winCount; i++) {
    const winGeo = new THREE.PlaneGeometry(winW, winH);
    const winMat = windowMaterial(winColor);
    const win = new THREE.Mesh(winGeo, winMat);
    win.position.set(
      -pos.w / 2 + winSpacing * (i + 1),
      pos.h * 0.5,
      -pos.d / 2 - 0.01
    );
    win.rotation.y = Math.PI;
    group.add(win);
    windowMeshes.push({ mesh: win, roomId: id, baseIntensity: 0.8 });
  }

  // Side windows
  const sideWinCount = Math.max(1, Math.floor(pos.d / 1.0));
  const sideSpacing = pos.d / (sideWinCount + 1);
  for (let i = 0; i < sideWinCount; i++) {
    // Left side
    const winGeoL = new THREE.PlaneGeometry(winW, winH);
    const winMatL = windowMaterial(winColor);
    const winL = new THREE.Mesh(winGeoL, winMatL);
    winL.position.set(-pos.w / 2 - 0.01, pos.h * 0.5, -pos.d / 2 + sideSpacing * (i + 1));
    winL.rotation.y = -Math.PI / 2;
    group.add(winL);
    windowMeshes.push({ mesh: winL, roomId: id, baseIntensity: 0.8 });

    // Right side
    const winGeoR = new THREE.PlaneGeometry(winW, winH);
    const winMatR = windowMaterial(winColor);
    const winR = new THREE.Mesh(winGeoR, winMatR);
    winR.position.set(pos.w / 2 + 0.01, pos.h * 0.5, -pos.d / 2 + sideSpacing * (i + 1));
    winR.rotation.y = Math.PI / 2;
    group.add(winR);
    windowMeshes.push({ mesh: winR, roomId: id, baseIntensity: 0.8 });
  }

  // Paper lantern above entrance
  const lanternGeo = new THREE.SphereGeometry(0.18, 8, 6);
  const lanternMat_ = lanternMaterial();
  const lantern = new THREE.Mesh(lanternGeo, lanternMat_);
  lantern.position.set(0, pos.h + 0.6, pos.d / 2 + 0.3);
  group.add(lantern);

  // Lantern string
  const stringGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.3);
  const stringMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
  const string = new THREE.Mesh(stringGeo, stringMat);
  string.position.set(0, pos.h + 0.8, pos.d / 2 + 0.3);
  group.add(string);

  // Point light from lantern
  const lanternLight = new THREE.PointLight(WINDOW_COLORS[id], 1.5, 4, 2);
  lanternLight.position.set(0, pos.h + 0.5, pos.d / 2 + 0.3);
  lanternLight.castShadow = false; // perf
  group.add(lanternLight);
  lanternLights.push({ light: lanternLight, baseIntensity: 1.5 });

  // Interior glow point light
  const interiorLight = new THREE.PointLight(WINDOW_COLORS[id], 0.8, 5, 2);
  interiorLight.position.set(0, pos.h * 0.5, 0);
  group.add(interiorLight);
  lanternLights.push({ light: interiorLight, baseIntensity: 0.8 });

  group.position.set(pos.x, 0, pos.z);
  scene.add(group);
  buildings[id] = group;

  return group;
}

// Create all buildings
for (const id of Object.keys(BUILDING_POS)) {
  createBuilding(id);
}

// Social Studio: Purple paper lanterns
function addPaperLanterns(building, color, count) {
  const pos = BUILDING_POS['social'];
  for (let i = 0; i < count; i++) {
    const lanternGeo = new THREE.SphereGeometry(0.12, 6, 4);
    const lMat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.6,
    });
    const l = new THREE.Mesh(lanternGeo, lMat);
    const angle = (i / count) * Math.PI * 2;
    l.position.set(
      Math.cos(angle) * (pos.w / 2 + 0.3),
      pos.h + 0.3 + Math.sin(i * 1.3) * 0.2,
      Math.sin(angle) * (pos.d / 2 + 0.3)
    );
    building.add(l);
  }
}
addPaperLanterns(buildings['social'], 0x8b5cf6, 6);

// Comms Room: Antenna mast
function createAntenna(building) {
  const pos = BUILDING_POS['comms'];
  const mastGeo = new THREE.CylinderGeometry(0.03, 0.05, 2.5);
  const mastMat = new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.8, roughness: 0.3 });
  const mast = new THREE.Mesh(mastGeo, mastMat);
  mast.position.set(0, pos.h + 1.5, 0);
  mast.castShadow = true;
  building.add(mast);

  // Antenna tip light
  const tipGeo = new THREE.SphereGeometry(0.06, 6, 6);
  const tipMat = new THREE.MeshStandardMaterial({
    color: 0x3b82f6,
    emissive: 0x3b82f6,
    emissiveIntensity: 2.0,
  });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.set(0, pos.h + 2.8, 0);
  building.add(tip);

  // Radial arms
  for (let i = 0; i < 3; i++) {
    const armGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.6);
    const arm = new THREE.Mesh(armGeo, mastMat);
    arm.rotation.z = Math.PI / 2;
    arm.rotation.y = (i / 3) * Math.PI;
    arm.position.set(0, pos.h + 2.2, 0);
    building.add(arm);
  }

  return tip;
}
const antennaTip = createAntenna(buildings['comms']);

// ─── CHERRY BLOSSOM PARTICLES ──────────────────────────────────────────────────
const PETAL_COUNT = 200;
const petalPositions = new Float32Array(PETAL_COUNT * 3);
const petalColors = new Float32Array(PETAL_COUNT * 3);
const petalPhases = new Float32Array(PETAL_COUNT); // for varied animation
const petalSpeeds = new Float32Array(PETAL_COUNT);

for (let i = 0; i < PETAL_COUNT; i++) {
  petalPositions[i * 3] = (Math.random() - 0.5) * 24;
  petalPositions[i * 3 + 1] = Math.random() * 12;
  petalPositions[i * 3 + 2] = (Math.random() - 0.5) * 24;
  petalPhases[i] = Math.random() * Math.PI * 2;
  petalSpeeds[i] = 0.3 + Math.random() * 0.7;

  // Pink/white colors
  const pink = Math.random() > 0.3;
  if (pink) {
    petalColors[i * 3] = 1.0;
    petalColors[i * 3 + 1] = 0.72 + Math.random() * 0.15;
    petalColors[i * 3 + 2] = 0.77 + Math.random() * 0.15;
  } else {
    petalColors[i * 3] = 0.95 + Math.random() * 0.05;
    petalColors[i * 3 + 1] = 0.92 + Math.random() * 0.05;
    petalColors[i * 3 + 2] = 0.95 + Math.random() * 0.05;
  }
}

const petalGeo = new THREE.BufferGeometry();
petalGeo.setAttribute('position', new THREE.BufferAttribute(petalPositions, 3));
petalGeo.setAttribute('color', new THREE.BufferAttribute(petalColors, 3));

const petalMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true,
});
const petals = new THREE.Points(petalGeo, petalMat);
scene.add(petals);

// ─── RAYCASTING & INTERACTION ──────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredBuilding = null;
const tooltip = document.getElementById('room-tooltip');

// Store original emissive intensities
const originalEmissives = new Map();
buildingMeshes.forEach(mesh => {
  if (mesh.material && mesh.material.emissiveIntensity !== undefined) {
    originalEmissives.set(mesh, mesh.material.emissiveIntensity);
  }
});

function getHoveredRoom(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(buildingMeshes);

  if (intersects.length > 0) {
    return intersects[0].object.userData.roomId;
  }
  return null;
}

renderer.domElement.addEventListener('mousemove', (event) => {
  const roomId = getHoveredRoom(event);

  // Reset previous hover
  if (hoveredBuilding && hoveredBuilding !== roomId && hoveredBuilding !== selectedRoom) {
    setBuildingHighlight(hoveredBuilding, false);
  }

  hoveredBuilding = roomId;

  if (roomId) {
    renderer.domElement.style.cursor = 'pointer';
    if (roomId !== selectedRoom) {
      setBuildingHighlight(roomId, true);
    }
    // Show tooltip
    tooltip.textContent = ROOM_META[roomId].label;
    tooltip.style.opacity = '1';
    tooltip.style.left = (event.clientX - container.getBoundingClientRect().left + 12) + 'px';
    tooltip.style.top = (event.clientY - container.getBoundingClientRect().top - 30) + 'px';
  } else {
    renderer.domElement.style.cursor = 'default';
    tooltip.style.opacity = '0';
  }
});

renderer.domElement.addEventListener('mouseleave', () => {
  if (hoveredBuilding && hoveredBuilding !== selectedRoom) {
    setBuildingHighlight(hoveredBuilding, false);
  }
  hoveredBuilding = null;
  tooltip.style.opacity = '0';
  renderer.domElement.style.cursor = 'default';
});

renderer.domElement.addEventListener('click', (event) => {
  const roomId = getHoveredRoom(event);
  if (roomId) {
    // Deselect previous
    if (selectedRoom && selectedRoom !== roomId) {
      setBuildingHighlight(selectedRoom, false);
    }
    selectedRoom = roomId;
    setBuildingHighlight(roomId, true, true);
    showDetail(roomId);
  }
});

function setBuildingHighlight(roomId, highlight, isSelected = false) {
  const building = buildings[roomId];
  if (!building) return;

  building.traverse(child => {
    if (child.isMesh && child.material) {
      if (highlight || isSelected) {
        child.material.emissive = child.material.emissive || new THREE.Color(0x000000);
        if (!child.material._originalEmissive) {
          child.material._originalEmissive = child.material.emissive.clone();
          child.material._originalEmissiveIntensity = child.material.emissiveIntensity;
        }
        const winColor = new THREE.Color(WINDOW_COLORS[roomId]);
        child.material.emissive.copy(winColor);
        child.material.emissiveIntensity = isSelected ? 0.4 : 0.2;
      } else {
        if (child.material._originalEmissive) {
          child.material.emissive.copy(child.material._originalEmissive);
          child.material.emissiveIntensity = child.material._originalEmissiveIntensity;
        }
      }
    }
  });
}

// ─── SPEECH BUBBLE ─────────────────────────────────────────────────────────────
const bubbleEl = document.getElementById('speech-bubble');
let bubbleIdx = 0;
let bubbleVisible = false;

function positionSpeechBubble() {
  if (!bubbleVisible) return;
  // Project Luka's head position to screen
  const headWorldPos = new THREE.Vector3(
    lukaGroup.position.x,
    1.3 + lukaGroup.position.y,
    lukaGroup.position.z
  );
  headWorldPos.project(camera);

  const rect = renderer.domElement.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const x = ((headWorldPos.x + 1) / 2) * rect.width + rect.left - containerRect.left;
  const y = ((-headWorldPos.y + 1) / 2) * rect.height + rect.top - containerRect.top;

  bubbleEl.style.left = (x - bubbleEl.offsetWidth / 2) + 'px';
  bubbleEl.style.top = (y - bubbleEl.offsetHeight - 10) + 'px';
}

function nextBubble() {
  bubbleEl.style.opacity = '0';
  setTimeout(() => {
    bubbleEl.textContent = SPEECH_LINES[bubbleIdx % SPEECH_LINES.length];
    bubbleIdx++;
    bubbleVisible = true;
    bubbleEl.style.opacity = '1';
    setTimeout(() => {
      bubbleEl.style.opacity = '0';
      setTimeout(() => { bubbleVisible = false; }, 500);
    }, 4000);
  }, 500);
}
setTimeout(nextBubble, 2000);
setInterval(nextBubble, 9000);

// ─── ANIMATION LOOP ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  controls.update();

  // Luka bob + head tilt
  lukaGroup.position.y = Math.sin(elapsed * 1.5) * 0.05;
  foxHead.rotation.y = Math.sin(elapsed * 0.8) * 0.15;
  tail.rotation.x = -0.4 + Math.sin(elapsed * 2) * 0.1;

  // Lantern light pulse
  for (const ll of lanternLights) {
    ll.light.intensity = ll.baseIntensity * (0.8 + 0.2 * Math.sin(elapsed * 2 + ll.baseIntensity));
  }

  // Window flicker for active rooms
  for (const w of windowMeshes) {
    const roomStatus = statusData.rooms[w.roomId]?.status;
    if (roomStatus === 'active') {
      w.mesh.material.emissiveIntensity = w.baseIntensity + Math.sin(elapsed * 3 + Math.random() * 0.05) * 0.15;
    }
  }

  // Antenna tip pulse
  if (antennaTip) {
    antennaTip.material.emissiveIntensity = 1.0 + Math.sin(elapsed * 4) * 1.0;
    antennaTip.scale.setScalar(0.8 + Math.sin(elapsed * 4) * 0.3);
  }

  // Rotating gear
  gearGroup.rotation.y = elapsed * 0.8;

  // Cherry blossom drift
  const posArr = petals.geometry.attributes.position.array;
  for (let i = 0; i < PETAL_COUNT; i++) {
    const idx = i * 3;
    // Horizontal drift (sine wave)
    posArr[idx] += Math.sin(elapsed * 0.5 + petalPhases[i]) * 0.003 * petalSpeeds[i];
    posArr[idx + 2] += Math.cos(elapsed * 0.4 + petalPhases[i]) * 0.002 * petalSpeeds[i];
    // Fall down slowly
    posArr[idx + 1] -= 0.005 * petalSpeeds[i];
    // Reset when below ground
    if (posArr[idx + 1] < -0.5) {
      posArr[idx] = (Math.random() - 0.5) * 24;
      posArr[idx + 1] = 8 + Math.random() * 4;
      posArr[idx + 2] = (Math.random() - 0.5) * 24;
    }
  }
  petals.geometry.attributes.position.needsUpdate = true;

  // Position speech bubble
  positionSpeechBubble();

  renderer.render(scene, camera);
}

animate();

// ─── PANEL LOGIC ───────────────────────────────────────────────────────────────
window.showOverview = function() {
  selectedRoom = null;
  // Deselect all buildings
  for (const id of Object.keys(buildings)) {
    setBuildingHighlight(id, false);
  }
  document.getElementById('panel-title').textContent = 'LUKA HQ Overview';
  document.getElementById('overview-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  buildOverview();
};

function buildOverview() {
  const el = document.getElementById('overview-view');
  el.innerHTML = '';
  const order = ['market', 'pulseforge', 'social', 'kidwatch', 'engine', 'comms'];
  for (const id of order) {
    const meta = ROOM_META[id];
    const data = statusData.rooms[id] || { status: 'idle', lastRun: '—', summary: '—' };
    const card = document.createElement('div');
    card.className = 'room-card' + (selectedRoom === id ? ' selected' : '');
    card.onclick = () => {
      if (selectedRoom && selectedRoom !== id) {
        setBuildingHighlight(selectedRoom, false);
      }
      selectedRoom = id;
      setBuildingHighlight(id, true, true);
      showDetail(id);
    };
    card.innerHTML = `
      <div class="room-card-top">
        <span class="room-card-name" style="color:${meta.hex}">${meta.label}</span>
        <span class="status-dot status-${data.status}"></span>
      </div>
      <div class="room-card-time">Last: ${data.lastRun}</div>
    `;
    el.appendChild(card);
  }
}

window.showDetail = showDetail;
function showDetail(id) {
  const meta = ROOM_META[id];
  const data = statusData.rooms[id] || { status: 'idle', lastRun: '—', summary: '—' };
  const statusLabel = { active: 'ACTIVE', idle: 'IDLE', error: 'ERROR' }[data.status] || data.status.toUpperCase();
  const statusColor = { active: '#10b981', idle: '#f59e0b', error: '#ef4444' }[data.status] || '#64748b';

  document.getElementById('panel-title').textContent = meta.label;
  document.getElementById('d-name').textContent = meta.label;
  document.getElementById('d-name').style.color = meta.hex;
  document.getElementById('d-dot').className = `status-dot status-${data.status}`;
  document.getElementById('d-status').textContent = statusLabel;
  document.getElementById('d-status').style.color = statusColor;
  document.getElementById('d-lastrun').textContent = `Last run: ${data.lastRun}`;
  document.getElementById('d-summary').textContent = data.summary;
  document.getElementById('d-ping').onclick = () => {
    alert(`📡 Pinging Luka in ${meta.label}...\n\n(Interaction coming soon — Luka will respond via Discord)`);
  };

  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
}

// ─── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const et = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: true
  }).format(now);
  document.getElementById('clock').textContent = et + ' ET';
}
setInterval(updateClock, 1000);
updateClock();

// ─── STATUS DATA ───────────────────────────────────────────────────────────────
function loadStatus() {
  fetch('./status.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      statusData = data;
      const updated = new Date(data.updated);
      document.getElementById('last-updated').textContent =
        'Updated: ' + updated.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit' }) + ' ET';

      const hasError = Object.values(data.rooms).some(r => r.status === 'error');
      const sysEl = document.getElementById('sys-status');
      if (hasError) {
        sysEl.style.color = '#ef4444';
        sysEl.textContent = 'SYSTEM ALERT';
      } else {
        sysEl.style.color = '#10b981';
        sysEl.textContent = 'ALL SYSTEMS NOMINAL';
      }

      buildOverview();
    })
    .catch(() => {
      buildOverview();
    });
}

loadStatus();
setInterval(loadStatus, 60000);
buildOverview();
